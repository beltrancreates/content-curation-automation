name: Content Curator Automation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch content
        run: python scripts/fetch.py

      - name: Filter content
        run: python scripts/filter.py

      - name: Publish content
        run: python scripts/publish.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ output/
          git diff --cached --quiet || git commit -m "Automated content curation update"
          git push
